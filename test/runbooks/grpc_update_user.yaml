desc: gRPC ユーザー更新
runners:
  greq:
    addr: localhost:50051
    tls: false
  db:
    dsn: "oracle://testuser:TestPass1%21@localhost:1521/FREEPDB1"
steps:
  create_user:
    greq:
      user.v1.UserService/CreateUser:
        message:
          name: gRPC Eve
          email: grpc-eve@example.com
          age: 19
    test: steps.create_user.res.status == 0

  bind_id:
    bind:
      user_id: steps.create_user.res.message.id

  update_user:
    greq:
      user.v1.UserService/UpdateUser:
        message:
          id: "{{ user_id }}"
          name: gRPC Eve Updated
          age: 20
    test: >
      steps.update_user.res.status == 0 &&
      steps.update_user.res.message.name == "gRPC Eve Updated" &&
      steps.update_user.res.message.age == 20

  verify_in_db:
    db:
      query: SELECT name, age FROM testuser.users WHERE id = {{ user_id }}
    test: >
      steps.verify_in_db.rows[0].NAME == "gRPC Eve Updated" &&
      steps.verify_in_db.rows[0].AGE == "20"

  update_not_found:
    greq:
      user.v1.UserService/UpdateUser:
        message:
          id: 999999
          name: Ghost
    test: steps.update_not_found.res.status == 5
