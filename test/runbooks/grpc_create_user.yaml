desc: gRPC ユーザー作成
runners:
  greq:
    addr: localhost:50051
    tls: false
  db:
    dsn: "oracle://testuser:TestPass1%21@localhost:1521/FREEPDB1"
steps:
  create_user:
    greq:
      user.v1.UserService/CreateUser:
        message:
          name: gRPC Alice
          email: grpc-alice@example.com
          age: 28
    test: steps.create_user.res.status == 0 && steps.create_user.res.message.name == "gRPC Alice"

  bind_id:
    bind:
      user_id: steps.create_user.res.message.id

  verify_in_db:
    db:
      query: SELECT COUNT(*) AS cnt FROM testuser.users WHERE id = {{ user_id }}
    test: steps.verify_in_db.rows[0].CNT == "1"

  duplicate_email:
    greq:
      user.v1.UserService/CreateUser:
        message:
          name: gRPC Alice2
          email: grpc-alice@example.com
    test: steps.duplicate_email.res.status == 6
